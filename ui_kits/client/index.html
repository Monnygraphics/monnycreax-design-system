const Button = ({ variant = "primary", size = "md", onClick, children, icon }) => {
  const variants = {
    primary:   { bg: "#F59E0B", fg: "#030712", border: "none" },
    secondary: { bg: "#F3F4F6", fg: "#4B5563", border: "none" },
    ghost:     { bg: "#fff",    fg: "#374151", border: "1px solid #E5E7EB" },
    dark:      { bg: "#030712", fg: "#fff",    border: "none" },
    blue:      { bg: "#3B82F6", fg: "#fff",    border: "none" },
  };
  const sizes = { sm: { px: 12, py: 7, fs: 12 }, md: { px: 16, py: 10, fs: 13 } };
  const v = variants[variant], s = sizes[size];
  return (
    <button onClick={onClick} style={{
      background: v.bg, color: v.fg, border: v.border,
      padding: `${s.py}px ${s.px}px`, borderRadius: 12,
      fontFamily: "DM Sans, sans-serif", fontWeight: 700, fontSize: s.fs,
      cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 6,
      transition: "all 200ms",
    }}>
      {icon && <Icon name={icon} size={13} color="currentColor" />}
      {children}

  );
};

    red:    { bg: "#FEF2F2", fg: "#DC2626" },

  const t = tints[tint];
  return (
    <Card padding={20}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ width: 40, height: 40, borderRadius: 12, background: t.bg, color: t.fg, display: "flex", alignItems: "center", justifyContent: "center" }}>

          return (
            <button key={p} onClick={() => setPage(p)} style={{
              width: "100%", display: "flex", alignItems: "center", gap: 12,
              padding: "10px 12px", borderRadius: 12,
              fontFamily: "DM Sans, sans-serif", fontSize: 13,
              background: active ? "#F59E0B" : "transparent",
              color: active ? "#030712" : "#9CA3AF",
              fontWeight: active ? 700 : 500,
              border: "none", cursor: "pointer", marginBottom: 2,
              transition: "all 200ms",
              textAlign: "left",
            }}
              onMouseEnter={(e) => { if (!active) { e.currentTarget.style.background = "rgba(255,255,255,0.05)"; e.currentTarget.style.color = "#fff"; } }}
              onMouseLeave={(e) => { if (!active) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "#9CA3AF"; } }}

const ClientMessages = () => {
  const [messages, setMessages] = useStateC(MOCK_PROJECTS[0].messages);
  const [text, setText] = useStateC("");
  const send = () => {
    if (!text.trim()) return;
    setMessages([...messages, { id: "n"+Date.now(), sender: "Sarah Mitchell", role: "client", text, time: "Now" }]);
    setText("");
  };
  return (
    <div style={{ padding: 24, height: "calc(100% - 0px)", display: "flex", flexDirection: "column" }}>
      <Card padding={0} style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>

        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: 20, display: "flex", flexDirection: "column", gap: 12 }}>
          {messages.map(m => {
            const isClient = m.role === "client";
            return (
              <div key={m.id} style={{ display: "flex", justifyContent: isClient ? "flex-end" : "flex-start" }}>
                <div style={{ maxWidth: "70%" }}>
                  <div style={{ background: isClient ? "#F59E0B" : "#F3F4F6", color: isClient ? "#030712" : "#111827", padding: "10px 14px", borderRadius: 16, fontSize: 13, lineHeight: 1.45 }}>{m.text}</div>
                  <div style={{ fontSize: 10, color: "#9CA3AF", marginTop: 4, textAlign: isClient ? "right" : "left" }}>{m.sender} · {m.time}</div>

              </div>
            );
          })}
        </div>
        <div style={{ padding: 16, borderTop: "1px solid #F3F4F6", display: "flex", gap: 8 }}>
          <input value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === "Enter" && send()} placeholder="Type a message…" style={{ flex: 1, background: "#F3F4F6", border: "none", borderRadius: 12, padding: "10px 14px", fontSize: 13, fontFamily: "DM Sans", outline: "none" }} />

    </div>
  );
};
